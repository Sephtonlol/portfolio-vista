@if (authenticationService.signedIn()) {
  <app-desktop [class.show-content]="!sleepOverlayVisible" />
  <app-taskbar [class.show-content]="!sleepOverlayVisible" />
}

@if (!lockScreenHidden && !bootScreenVisible) {
  <app-lock-screen
    [class.lock-screen-exiting]="lockScreenExiting"
    [suspended]="bootScreenVisible"
  />
}

@if (sleepOverlayVisible) {
  <div
    class="sleep-overlay"
    [class.active]="sleepOverlayActive"
    (click)="wakeFromSleep()"
    aria-label="Sleeping"
  ></div>
}

@if (bootScreenVisible) {
  <app-boot-screen
    [exiting]="bootScreenExiting"
    [mode]="bootScreenMode"
    [totalDurationMs]="bootScreenTotalDurationMs"
    [preDelayMs]="bootScreenPreDelayMs"
    [tailHoldMs]="bootScreenTailHoldMs"
    [errorMode]="bootScreenErrorMode"
    (finished)="onBootScreenFinished()"
  />
}

@if (logoutFlash) {
  <div class="logout-flash"></div>
}

<app-context-menu />
