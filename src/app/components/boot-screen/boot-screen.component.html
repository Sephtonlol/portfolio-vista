<div class="boot-screen" [class.exiting]="exiting">
  @if (contentVisible) {
    <div class="boot-terminal" aria-label="Boot log">
      <div class="boot-log" role="log" aria-live="polite">
        @for (line of renderedLines; track line.id) {
          <div
            class="boot-line"
            [class.boot-line-error]="isErrorLine(line.text)"
          >
            {{ line.text }}
          </div>
        }
      </div>

      <div class="boot-hud" aria-hidden="true">
        <div class="boot-progress">{{ progressBarText }}</div>
        <div class="boot-spinner">{{ spinnerChar }} {{ statusText }}</div>
      </div>
    </div>
  }
</div>
